services:

  web:
    image: aguinaldomneto/projeto-devops:${VERSION}
    container_name: web_server
    ports:
      - "8080:80"
    depends_on:
      - db

  db:
    image: mysql:5.7
    container_name: mysql_db
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
