name: CI/CD DevOps Pipeline

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-process: true

env:
  IMAGE_NAME: aguinaldomneto/projeto-devops

jobs:

  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      VERSION: ${{ steps.version.outputs.VERSION }}

    steps:

    - name: Checkout do código
      uses: actions/checkout@v3

    - name: Login no Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASS }}

    # 🔥 GERA VERSION CORRETAMENTE
    - name: Definir versão
      id: version
      run: |
        VERSION=v1.0.${{ github.run_number }}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

    - name: Debug VERSION
      run: echo "VERSION gerada = ${{ steps.version.outputs.VERSION }}"

    - name: Build da imagem
      run: |
        docker build -t $IMAGE_NAME:${{ steps.version.outputs.VERSION }} \
                     -t $IMAGE_NAME:latest .

    - name: Push da imagem
      run: |
        docker push $IMAGE_NAME:${{ steps.version.outputs.VERSION }}
        docker push $IMAGE_NAME:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:

    - name: Debug recebendo VERSION
      run: echo "VERSION recebida = ${{ needs.build-and-push.outputs.VERSION }}"

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_KEY }}
        script: |
          cd ~/projeto-devops

          echo "Versão recebida: ${{ needs.build-and-push.outputs.VERSION }}"

          export VERSION=${{ needs.build-and-push.outputs.VERSION }}

          docker compose down
          docker compose pull
          docker compose up -d
